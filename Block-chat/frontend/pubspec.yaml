name: block_chat
description: Block Chat - Privacidade em cada bloco.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # Networking & Real-time
  dio: ^5.4.0
  socket_io_client: ^2.0.3
  
  # Local Storage & Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  flutter_secure_storage: ^9.0.0
  
  # Encryption
  cryptography: ^2.7.0
  pointycastle: ^3.7.3
  
  # Location & Maps
  flutter_map: ^6.1.0
  geolocator: ^10.1.0
  latlong2: ^0.9.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  mime: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
